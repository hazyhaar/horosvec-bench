<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="refresh" content="5">
<title>horosvec — préchauffage en cours</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --border: #30363d;
    --fg: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--fg); min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  main {
    max-width: 32rem; margin: 1.25rem; padding: 2rem 2.25rem; text-align: center;
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
  }
  h1 { font-size: 1.4rem; font-weight: 600; margin: 0 0 .75rem; }
  p { color: var(--muted); margin: 0 0 1rem; font-size: .95rem; }
  .bar {
    height: 4px; border-radius: 2px; overflow: hidden; background: var(--border); margin-top: 1.25rem;
  }
  .bar > span {
    display: block; height: 100%; width: 40%; background: var(--accent);
    border-radius: 2px; animation: slide 1.4s ease-in-out infinite;
  }
  @keyframes slide {
    0% { margin-left: -40%; } 100% { margin-left: 100%; }
  }
</style>
</head>
<body>
<main>
  <h1>Préchauffage en cours</h1>
  <p>Le chargement de l'index sémantique HNbook (26,7&nbsp;millions d'items) est en cours.
     La recherche sera disponible dans quelques instants.</p>
  <p>Cette page se rafraîchit automatiquement.</p>
  <div class="bar" aria-hidden="true"><span></span></div>
</main>
</body>
</html>
